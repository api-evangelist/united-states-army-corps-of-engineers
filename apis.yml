aid: united-states-army-corps-of-engineers
name: United States Army Corps of Engineers
description: >-
  The U.S. Army Corps of Engineers (USACE) provides engineering and construction
  services for the nation, managing water resources, infrastructure, and
  environmental projects. USACE operates the Corps Water Management System
  (CWMS) Data API, a RESTful service for accessing real-time and historical
  water management data including time series measurements, location information,
  ratings, forecasts, and project data for USACE-managed water resources
  across the United States.
