apis:
  - aid: united-states-army-corps-of-engineers:cwms-data-api
    name: CWMS Data API
    description: >-
      The Corps Water Management System (CWMS) Data API provides a RESTful
      interface for retrieving water management data from the U.S. Army Corps
      of Engineers. Supports access to time series, locations, ratings,
      forecasts, levels, projects, basins, and parameters for USACE-managed
      water resources nationwide.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
